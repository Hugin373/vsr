# M1 stimulus set v0 — congruent conditions only, 500 images.
# Two equal-physical-size primitives on a ground plane; depth, retinal size and
# vertical position all co-vary naturally (no cue conflict). Conflict conditions
# (fixed-retinal, elevation-conflict) come at M4.
#
# Fully reproducible from (this config + seed). Render: bpy / Cycles CPU (M1.1 decision).

experiment: stimuli_v0_congruent
seed: 0
n_images: 500

output:
  set_name: v0_congruent
  root: ${DATA_ROOT}/stimuli   # -> $DATA_ROOT/stimuli/v0_congruent/{images,masks,annotations.jsonl,config.yaml}

render:
  engine: CYCLES
  device: CPU
  res_x: 512
  res_y: 512
  samples: 32
  denoise: true
  cycles_seed: 0

camera:
  pos_world: [0.0, -2.5, 1.4]      # 1.4 m eye height, 2.5 m back (close enough that
  target_world: [0.0, 1.2, 0.35]   # objects subtend a median ~60-120 px)
  f_mm: 35.0
  sensor_width_mm: 36.0

scene:
  ground_color: [0.45, 0.45, 0.48]
  sun_energy: 4.0
  sun_direction: [5.0, -5.0, 8.0]

objects:
  base_size_m: 0.6                 # starting size for the calibrator only
  categories: [cube, sphere, cylinder]
  # Per-category sizes calibrated by scripts/calibrate_sizes.py so that a cube, a sphere
  # and a cylinder subtend the SAME retinal pixel-height at the same depth (the metric
  # retinal_size_px records). Without this, a cube's silhouette reaches its diagonal
  # while a sphere's reaches only its diameter, so a FAR cube could out-measure a NEAR
  # sphere and invert the size cue. Regenerate with:
  #   uv run --extra stimuli scripts/calibrate_sizes.py --config <this file> --target-px 90
  size_calibration_file: configs/size_calibration.yaml
  colors:
    red: [0.80, 0.05, 0.05]
    green: [0.05, 0.55, 0.10]
    blue: [0.05, 0.20, 0.80]
    yellow: [0.85, 0.72, 0.05]

factors:
  near_depth_bins: [0.0, 0.5, 1.0, 1.5, 2.0]     # world-y of the nearer object
  depth_gaps: [0.5, 1.0, 1.5]                    # far object = near + gap
  depth_jitter: 0.15                             # ± uniform jitter -> continuous depth
  min_gap: 0.3                                   # floor on far-near after jitter
  lateral_offset: 0.7                            # objects offset ±0.7 m laterally
  # Physical-size variation across images. In the CONGRUENT condition BOTH objects of a
  # pair share the SAME multiplier: independent per-object size jitter would let physical
  # size invert the retinal cue (a physically-bigger far object out-measuring a nearer
  # one), which is exactly the manipulation the M4 conflict designs will make on purpose.
  # Independent per-object size jitter therefore belongs to the `size_condition` factor
  # (M4: size_condition = fixed_retinal / conflict), NOT here.
  size_multipliers: [0.9, 1.0, 1.1]              # shared by both objects in a pair

constraints:
  # Centre-depth order and nearest-surface order must agree, so "which is closer?" is
  # never perceptually ambiguous. Objects of different shape have different half-extents
  # along the viewing axis, so a far cube can present a nearer surface than a near
  # sphere when the centre gap is small. The far object is pushed back until the centre
  # gap exceeds |h_near - h_far| + ordinal_margin_m.
  unambiguous_ordinal: true
  ordinal_margin_m: 0.15

  # PRINCIPLE: "congruent" must mean congruent BY CONSTRUCTION, for EVERY measured cue —
  # not congruent by luck of the seed. Each apparent-size cue has its own structural
  # threshold on the far/near depth ratio (see cue_constants below):
  #     height cue : ratio > ~1.016   (calibration equalises height, so this is tiny)
  #     area   cue : ratio > ~1.158   (calibration does NOT equalise area — see below)
  # 1.18 clears the worst case (near=cylinder/far=cube, 1.158) with ~2% headroom.
  #
  # NB the area threshold MUST be computed from WORST-CASE constants, not mean ones: a
  # cube's silhouette area varies ~±11% with pose/depth (a nearer cube shows more of its
  # faces), so a mean-based threshold (which gives a far-too-low 1.096) does not
  # guarantee anything. A 1.12 floor was tried and left a 0.6% worst-case margin.
  #
  # This is a UNIFORM floor on purpose. Per-pairing thresholds would be less restrictive
  # (near=cube/far=sphere needs no constraint at all) but would make SHAPE predict the
  # depth-ratio distribution — a confound a probe could exploit. Uniform keeps the depth
  # ratio independent of the shape pairing.
  min_depth_ratio: 1.18

# Measured cue constants (from the calibrated v0 renders). Kept here for reuse by M4's
# CONFLICT designs, which need to invert a cue on purpose by a known amount.
#
# You cannot equalise height and area simultaneously across shapes: silhouettes fill
# their bounding boxes differently, so equalising one leaves the other shape-dependent.
# We calibrate on HEIGHT (that is what retinal_size_px records) and then use
# min_depth_ratio to keep AREA congruent too.
cue_constants:
  # fraction of its bbox each silhouette actually fills
  fill_factor: {cube: 0.939, cylinder: 0.908, sphere: 0.784}
  # height * depth  (equalised by the size calibration -> height congruence is structural)
  height_constant: {cube: 409.3, cylinder: 410.3, sphere: 405.3}

  # area * depth^2 (calibrated size_m baked in, size_multiplier divided out). NOT
  # equalised by the height calibration -> this is what min_depth_ratio must cover.
  # Split by NEAR/FAR role because perspective differs: a nearer cube shows more of its
  # faces, so its area constant is larger. Mean values hide an ~±11% cube spread, so the
  # thresholds below use worst-case (max as FAR / min as NEAR), never means.
  area_constant_far:  {cube: [139863, 171495], cylinder: [124010, 137850], sphere: [128132, 133094]}  # [min, max]
  area_constant_near: {cube: [148480, 182933], cylinder: [127900, 143832], sphere: [128932, 135860]}  # [min, max]

  # required depth ratio per pairing = sqrt( max(A_far as FAR) / min(A_near as NEAR) )
  required_ratio_by_pairing:
    near_cylinder_far_cube: 1.158   # <-- worst case, sets min_depth_ratio
    near_sphere_far_cube:   1.153
    near_cube_far_cube:     1.075
    near_cylinder_far_cylinder: 1.038
    near_sphere_far_cylinder:   1.034
    near_sphere_far_sphere:     1.016
    near_cube_far_cylinder: 0.964   # never binds
    near_cube_far_sphere:   0.947   # never binds
  area_ratio_threshold: 1.158       # worst-case; a mean-based estimate (1.096) is unsafe
  height_ratio_threshold: 1.016

condition:
  size_condition: congruent
  elevation_condition: congruent
