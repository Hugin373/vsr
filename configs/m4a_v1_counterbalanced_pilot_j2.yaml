# Counterbalanced pilot, JITTER v2 (2026-07-18) — strengthened camera decorrelation.
# Identical to m4a_v1_counterbalanced_pilot EXCEPT the camera.jitter block: adds lateral/depth
# camera TRANSLATION (pos_x_m / pos_y_m) and widens yaw/pitch/height. Purpose: test whether the
# position leak (world-x still R²≈0.92 from mask geometry under the old ±3° pan-only jitter)
# collapses when the camera actually moves. Rendered to a separate set so the v1 pilot stays intact
# for comparison. Same seed → same object sampling; only the camera differs.
experiment: m4a_v1_counterbalanced_pilot_j2
seed: 411
n_images: 60
output:
  set_name: m4a_v1_counterbalanced_pilot_j2
  root: ${DATA_ROOT}/stimuli
render:
  engine: CYCLES
  device: CPU
  res_x: 512
  res_y: 512
  samples: 96
  denoise: false
  adaptive_sampling: false
  cycles_seed: 411
camera:
  pos_world:
  - 0.0
  - -2.5
  - 1.4
  target_world:
  - 0.0
  - 1.2
  - 0.35
  f_mm: 35.0
  sensor_width_mm: 36.0
  jitter:
    height_m:
    - -0.16
    - 0.16
    pos_x_m:        # lateral dolly — the load-bearing addition. Moderated further now that the
    - -0.3         # target margins (14/6 px) are ACTIVE (wiring bug fixed): active margins +
    - 0.3          # aggressive jitter over-constrain the placement guard.
    pos_y_m:        # depth dolly
    - -0.2
    - 0.2
    pitch_deg:
    - -3.0
    - 3.0
    yaw_deg:
    - -4.0
    - 4.0
scene:
  ground_colors:
  - - 0.45
    - 0.45
    - 0.48
  - - 0.38
    - 0.42
    - 0.4
  - - 0.5
    - 0.46
    - 0.4
  - - 0.4
    - 0.4
    - 0.46
  sun_energy_range:
  - 3.0
  - 5.5
  sun_direction:
  - 5.0
  - -5.0
  - 8.0
  sun_direction_jitter: 0.6
objects:
  categories:
  - cube
  - sphere
  - cylinder
  - chair
  - mug
  - bottle
  size_m_by_category:
    cube: 0.666
    sphere: 0.809
    cylinder: 0.666
    chair: 0.7353
    mug: 0.9913
    bottle: 0.8378
  colors:
    red:
    - 0.8
    - 0.05
    - 0.05
    green:
    - 0.05
    - 0.55
    - 0.1
    blue:
    - 0.05
    - 0.2
    - 0.8
    yellow:
    - 0.85
    - 0.72
    - 0.05
factors:
  near_depth_bins:   # 0.2 dropped 2026-07-18: un-placeable at 500 attempts under +/-0.3m
  - 0.65             # translation (framing limit at closest depth; more attempts never helped)
  - 1.1
  - 1.55
  - 2.0
  depth_gaps:
  - 0.45
  - 0.75
  - 1.05
  - 1.35
  depth_jitter: 0.12
  min_gap: 0.28
  lateral_range:
  - 0.3
  - 0.85
  size_multiplier_range:
  - 0.75
  - 1.2
constraints:
  unambiguous_ordinal: true
  ordinal_margin_m: 0.15
  min_depth_ratio: 1.05
  min_depth_ratio_jitter: 0.04
condition:
  target_bbox_margin_px: 14.0
  target_frame_margin_px: 6.0
  target_placement_attempts: 500
  regime: counterbalanced
  size_condition: independent_jitter
  elevation_condition: counterbalanced
distractors:
  count_levels:
  - 0
  - 1
  - 2
  categories:
  - cube
  - sphere
  - cylinder
  size_multiplier_range:
  - 0.45
  - 0.7
  x_range:
  - -1.55
  - 1.55
  y_range:
  - 2.7
  - 4.4
